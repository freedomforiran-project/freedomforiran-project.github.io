<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect
      // Store the current path in sessionStorage and redirect to index.html
      sessionStorage.setItem('redirect', window.location.pathname);
      window.location.replace('/');
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
